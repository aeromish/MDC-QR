services:
  postgres:
    image: postgres:16-alpine
    container_name: mdc_lms_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # KHONG map port ra ngoai — DB chi truy cap noi bo trong mang docker.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mdc_net

  api:
    build: .
    container_name: mdc_lms_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: postgres
    volumes:
      - uploads:/app/uploads
    ports:
      # Chi lang nghe localhost cua VPS; Nginx/Cloudflare se reverse-proxy vao day.
      - "127.0.0.1:3000:3000"
    networks:
      - mdc_net

volumes:
  pgdata:
  uploads:

networks:
  mdc_net:
    driver: bridge
